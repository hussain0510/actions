name: Generate ASCII Artwork

on:
    workflow_dispatch: 

jobs:
    ascii_job:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repo
              uses: actions/checkout@v6

            - name: list repo files
              run: ls -ltra

            - name: grant permissions to the shell script
              run: chmod 755 ascii-script.sh

            - name: execute shell scriot
              run: ./ascii-script.sh